name: Cap
options:
  bundleIdPrefix: com.xavier.cap
  deploymentTarget:
    iOS: "26.0"
targets:
  Cap:
    type: application
    platform: iOS
    sources:
      - CapApp
    info:
      path: CapApp/Info.plist
      properties:
        UILaunchScreen: {}
        NSCalendarsFullAccessUsageDescription: "Cap reads your calendar to tell you what's coming up and help you plan your day."
        NSCalendarsUsageDescription: "Cap reads your calendar to tell you what's coming up and help you plan your day."
        NSContactsUsageDescription: "Cap reads contact birthdays so it can remind you. This never leaves your device."
        NSMicrophoneUsageDescription: "Cap uses the microphone so you can talk to it instead of typing."
        NSSpeechRecognitionUsageDescription: "Cap transcribes your speech on-device so you can talk to it hands-free."
        NSLocationWhenInUseUsageDescription: "Cap uses your location to estimate when you need to leave to arrive on time."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Cap watches a few key places (like your dorm or library) to alert you on arrival and departure. Location is used only for these on-device geofences."
        CFBundleURLTypes:
          - CFBundleURLName: com.xavier.cap.google
            CFBundleURLSchemes:
              - com.googleusercontent.apps.407694880805-l073efr767eeqqangm60eosii8lukal1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xavier.cap
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # DEVELOPMENT_TEAM: "YOUR_TEAM_ID"   # uncomment and fill in to silence the signing prompt
schemes:
  Cap:
    build:
      targets:
        Cap: all
    run:
      config: Debug
    archive:
      config: Release
