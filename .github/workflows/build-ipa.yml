name: Build unsigned IPA

# Builds Cap on every push to main (and manually on demand), with no code-signing —
# Sideloadly does the real signing later, locally, with your own free Apple ID.
# This step alone is also how you debug FoundationModelsService.swift without a Mac:
# read the "Build" step's log for compiler errors and fix the Swift code accordingly.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    # macos-15 defaults to Xcode 16.4 (iOS SDK ceiling 18.5) — no FoundationModels
    # framework exists at that SDK level. macos-26 (GA since Feb 2026) defaults to
    # Xcode 26.4.1, which has it.
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications | grep Xcode

      # If the runner's default Xcode isn't 26.x yet, uncomment and set the exact path
      # shown above, e.g.: sudo xcode-select -s /Applications/Xcode_26.0.app
      # - name: Select Xcode
      #   run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Xcode version in use
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned, device SDK)
        run: |
          xcodebuild \
            -project Cap.xcodeproj \
            -scheme Cap \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package IPA
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/Cap.app"
          mkdir -p ipa/Payload
          cp -r "$APP_PATH" ipa/Payload/
          cd ipa && zip -r ../Cap.ipa Payload && cd ..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cap-unsigned
          path: Cap.ipa
          retention-days: 30
